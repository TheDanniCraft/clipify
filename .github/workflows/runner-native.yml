name: Native Runner validation

on:
  push:
    paths:
      - "src/runner/**"
      - "scripts/build-runner.ts"
      - "scripts/fingerprint-runner.mjs"
      - "scripts/check-runner-native.mjs"
      - "scripts/run-runner-self-test.mjs"
      - "scripts/write-runner-metadata.mjs"
      - "scripts/validate-runner-matrix.mjs"
      - "runner-build-config.json"
      - "package.json"
      - "bun.lock"
      - "patches/yao-pkg-qemu.patch"
      - ".github/workflows/runner-native.yml"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/runner/**"
      - "scripts/build-runner.ts"
      - "scripts/fingerprint-runner.mjs"
      - "scripts/check-runner-native.mjs"
      - "scripts/run-runner-self-test.mjs"
      - "scripts/write-runner-metadata.mjs"
      - "scripts/validate-runner-matrix.mjs"
      - "runner-build-config.json"
      - "package.json"
      - "bun.lock"
      - "patches/yao-pkg-qemu.patch"
      - ".github/workflows/runner-native.yml"

permissions:
  contents: read

jobs:
  prepare-context:
    if: github.event_name == 'push' || github.event.pull_request.head.repo.fork == true
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.context.outputs.ref }}
      source-fingerprint: ${{ steps.context.outputs.source-fingerprint }}
      source-commit: ${{ steps.context.outputs.source-commit }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
      - id: context
        env:
          CHECKOUT_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          git config core.autocrlf false
          context="$(node scripts/fingerprint-runner.mjs --json)"
          fingerprint="$(node -e 'const fs=require("fs"); console.log(JSON.parse(fs.readFileSync(0, "utf8")).sourceFingerprint)' <<<"$context")"
          commit="$(node -e 'const fs=require("fs"); console.log(JSON.parse(fs.readFileSync(0, "utf8")).sourceCommit)' <<<"$context")"
          echo "ref=$CHECKOUT_REF" >> "$GITHUB_OUTPUT"
          echo "source-fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"
          echo "source-commit=$commit" >> "$GITHUB_OUTPUT"
          echo "Runner source: $commit ($fingerprint)"

  build:
    needs: prepare-context
    if: needs.prepare-context.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: windows-x64, target: node24-win-x64, runner: windows-latest, binary: clipify-runner-windows.exe }
          - { platform: linux-x64, target: node24-linux-x64, runner: ubuntu-latest, binary: clipify-runner-linux }
          - { platform: linux-arm64, target: node24-linux-arm64, runner: ubuntu-24.04-arm, binary: clipify-runner-linux-arm64 }
          - { platform: macos-x64, target: node24-macos-x64, runner: macos-13, binary: clipify-runner-macos }
          - { platform: macos-arm64, target: node24-macos-arm64, runner: macos-14, binary: clipify-runner-macos-arm64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare-context.outputs.ref }}
          fetch-depth: 1
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Verify native keyring binding
        run: node scripts/check-runner-native.mjs
      - name: Verify shared source fingerprint
        shell: bash
        env:
          EXPECTED_FINGERPRINT: ${{ needs.prepare-context.outputs.source-fingerprint }}
        run: test "$(node scripts/fingerprint-runner.mjs --fingerprint)" = "$EXPECTED_FINGERPRINT"
      - name: Build runner
        env:
          CLIPIFY_RUNNER_API_URL: https://runner-build.invalid
          PKG_CACHE_PATH: ${{ runner.temp }}/pkg-cache
          RUNNER_PKG_TARGETS: ${{ matrix.target }}
        run: bun scripts/build-runner.ts
      - name: Smoke-test executable
        shell: bash
        run: |
          if [ "$RUNNER_OS" != "Windows" ]; then
            chmod +x "public/downloads/runner/${{ matrix.binary }}"
          fi
          node scripts/run-runner-self-test.mjs "public/downloads/runner/${{ matrix.binary }}"
      - name: Write artifact metadata
        env:
          RUNNER_ARTIFACT_DIR: ${{ runner.temp }}/runner-artifact
        run: node scripts/write-runner-metadata.mjs --platform "${{ matrix.platform }}" --target "${{ matrix.target }}" --binary "public/downloads/runner/${{ matrix.binary }}" --fingerprint "${{ needs.prepare-context.outputs.source-fingerprint }}" --commit "${{ needs.prepare-context.outputs.source-commit }}"
      - uses: actions/upload-artifact@v4
        with:
          name: runner-${{ matrix.platform }}-${{ needs.prepare-context.outputs.source-fingerprint }}
          path: ${{ runner.temp }}/runner-artifact
          retention-days: 7
          if-no-files-found: error

  validate:
    needs: [prepare-context, build]
    if: needs.prepare-context.result == 'success' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
          ref: ${{ needs.prepare-context.outputs.ref }}
      - uses: actions/download-artifact@v4
        with:
          pattern: runner-*-${{ needs.prepare-context.outputs.source-fingerprint }}
          path: ${{ runner.temp }}/runner-artifacts
          merge-multiple: false
      - name: Validate complete matrix
        run: node scripts/validate-runner-matrix.mjs "${{ runner.temp }}/runner-artifacts" "${{ needs.prepare-context.outputs.source-fingerprint }}"
