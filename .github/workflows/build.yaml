name: 🛠️ Build and Push Docker image to GHCR

on:
  release:
    types: [created]
permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: 🔡 Prepare env
        id: prepareEnv
        run: |
          echo "REPO_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: 🐳 Docker Meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REPO_NAME }}

      - name: 📥 Check out the repository
        uses: actions/checkout@v6

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔍 Verify Dockerfile exists
        run: test -f Dockerfile

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 📦 Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ matrix.platform }}
          context: .
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ env.REPO_NAME }},push-by-digest=true,name-canonical=true,push=true

          cache-from: type=gha,scope=clipify-build-and-push-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=clipify-build-and-push-${{ matrix.platform }}

      - name: 📜 Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: 📤 Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    steps:
      - name: 🔡 Prepare env
        id: prepareEnv
        run: |
          echo "REPO_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: 📥 Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Create manifest list and push
        working-directory: /tmp/digests
        run: |
          TAGS="-t ghcr.io/${{ env.REPO_NAME }}:${{ github.event.release.tag_name }}"
          if [ "${{ github.event.release.prerelease }}" = "false" ]; then
            TAGS="$TAGS -t ghcr.io/${{ env.REPO_NAME }}:latest"
          else
            TAGS="$TAGS -t ghcr.io/${{ env.REPO_NAME }}:nightly"
          fi
          docker buildx imagetools create \
            $TAGS \
            $(printf 'ghcr.io/${{ env.REPO_NAME }}@sha256:%s ' *)

      - name: 🔍 Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ env.REPO_NAME }}:${{ github.event.release.tag_name }}
          if [ "${{ github.event.release.prerelease }}" = "false" ]; then
            docker buildx imagetools inspect ghcr.io/${{ env.REPO_NAME }}:latest
          else
            docker buildx imagetools inspect ghcr.io/${{ env.REPO_NAME }}:nightly
          fi
