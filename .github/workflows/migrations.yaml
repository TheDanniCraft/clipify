name: 🗃️ Generate Migrations

on:
  push:
    branches:
      - master
    paths:
      - "src/db/schema.ts"
      - "src/app/lib/types.ts"

jobs:
  generate-migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Use deploy key for enabling bypass of branch protection, thanks to https://github.com/sbellone/release-workflow-example
      - name: 📥 Check out the repository
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}
      - name: 🍞 Set up Bun
        uses: oven-sh/setup-bun@v2
      - name: 📦 Install dependencies
        run: bun install
      - name: 📝 Generate migrations
        run: bun run db:generate

      - name: 🔑 Import GPG key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true
      - name: 🚀 Commit and push migrations
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "🗃️ Update migration files (from ${{ github.event.after}})"
          file_pattern: drizzle/*
          commit_author: "${{ steps.import-gpg.outputs.name }} <${{ steps.import-gpg.outputs.email }}>"
          commit_user_name: ${{ steps.import-gpg.outputs.name }}
          commit_user_email: ${{ steps.import-gpg.outputs.email }}
