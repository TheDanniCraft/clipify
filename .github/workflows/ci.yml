name: 🧪 CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master]

permissions:
  contents: read
  pull-requests: write

jobs:
  deps:
    name: ♻️ Prepare dependency cache
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.compute-key.outputs.key }}
      cache-hit: ${{ steps.restore.outputs.cache-hit }}
    steps:
      - name: 📥 Check out repository
        uses: actions/checkout@v7

      - name: 🟢 Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # compute the cache key once so downstream jobs can reuse it
      - name: 🔑 Compute cache key
        id: compute-key
        run: echo "key=${{ runner.os }}-deps-${{ hashFiles('**/bun.lock', 'package.json', 'patches/*.patch') }}" >> "$GITHUB_OUTPUT"

      # try to restore an existing cache
      - name: ♻️ Restore Bun & node_modules cache
        id: restore
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun/install/global
            **/node_modules
          key: ${{ steps.compute-key.outputs.key }}

      # only install if the cache did not exist
      - name: 📦 Install dependencies
        if: steps.restore.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile

      - name: 🧩 Validate all Bun package patches
        run: node -e 'const fs=require("fs"); const p=require("./package.json"); for (const [specifier, patch] of Object.entries(p.patchedDependencies ?? {})) { if (!fs.existsSync(patch)) throw new Error(`Missing patch file: ${patch}`); const packageName = specifier.slice(0, specifier.lastIndexOf("@")); const patchText = fs.readFileSync(patch, "utf8"); for (const file of [...patchText.matchAll(/^\+\+\+ b\/(.+)$/gm)].map((m) => m[1]).filter((file) => file !== "/dev/null")) { const target = `node_modules/${packageName}/${file}`; if (!fs.existsSync(target)) throw new Error(`Patch target missing for ${specifier}: ${target}`); } }'

      # save a new cache entry when we had a miss
      - name: 💾 Save Bun & node_modules cache
        if: steps.restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun/install/global
            **/node_modules
          key: ${{ steps.compute-key.outputs.key }}

  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - name: 📥 Check out repository
        uses: actions/checkout@v7

      - name: 🟢 Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: ♻️ Restore deps cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun/install/global
            **/node_modules
          key: ${{ needs.deps.outputs.cache-key }}

      - name: 🧹 Run lint
        run: bun run app:lint

  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - name: 📥 Check out repository
        uses: actions/checkout@v7

      - name: 🟢 Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: ♻️ Restore deps cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun/install/global
            **/node_modules
          key: ${{ needs.deps.outputs.cache-key }}

      - name: 🧪 Run tests with coverage
        run: bun run test:coverage

      - name: 📦 Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/

  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: deps
    steps:
      - name: 📥 Check out repository
        uses: actions/checkout@v7

      - name: 🟢 Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: ♻️ Restore deps cache
        uses: actions/cache/restore@v6
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun/install/global
            **/node_modules
          key: ${{ needs.deps.outputs.cache-key }}

      - name: ⚡ Cache Next.js build
        uses: actions/cache@v6
        with:
          # See here for caching with `yarn`, `bun` or other package managers https://github.com/actions/cache/blob/main/examples.md or you can leverage caching with actions/setup-node
          path: |
            ${{ github.workspace }}/.next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lockb') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/bun.lockb') }}-

      - name: 🏗️ Run build
        run: bun run app:build

      - name: 🔐 Verify server action manifest boundaries
        run: bun run app:check-action-manifest
